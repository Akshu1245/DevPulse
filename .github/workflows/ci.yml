name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('devpulse-backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: devpulse-backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: devpulse-backend
        run: python -m pytest tests/ -v --tb=short

  frontend-tests:
    name: Frontend Tests (Node.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: devpulse-dashboard-ui/package-lock.json

      - name: Install dependencies
        working-directory: devpulse-dashboard-ui
        run: npm ci

      - name: Type check
        working-directory: devpulse-dashboard-ui
        run: npx tsc --noEmit

      - name: Run unit tests
        working-directory: devpulse-dashboard-ui
        run: npm test

  frontend-e2e:
    name: Frontend E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: devpulse-dashboard-ui/package-lock.json

      - name: Install dependencies
        working-directory: devpulse-dashboard-ui
        run: npm ci

      - name: Install backend dependencies
        working-directory: devpulse-backend
        run: pip install -r requirements.txt

      - name: Start backend
        working-directory: devpulse-backend
        run: python -m uvicorn main:app --host 0.0.0.0 --port 8000 &

      - name: Start frontend
        working-directory: devpulse-dashboard-ui
        run: npm run dev &
        env:
          BACKEND_URL: http://localhost:8000

      - name: Wait for servers to be ready
        run: |
          npx wait-on http://localhost:5000 http://localhost:8000/health --timeout 60000

      - name: Run Cypress E2E tests
        working-directory: devpulse-dashboard-ui
        run: npm run test:e2e
        env:
          CYPRESS_BASE_URL: http://localhost:5000
